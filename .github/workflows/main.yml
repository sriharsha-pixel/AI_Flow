name: AI Flow Automated Tests

on:
  workflow_dispatch:
#on:
#schedule:
#Run every day at 8:00 AM UTC
#- cron: '0 8 * * *'
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci # safer than npm install for CI

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        #run: npx playwright test --trace=on
        run: npx playwright test --trace=on

      # Upload Playwright HTML Report
      #- name: Upload Playwright HTML Report
      #  if: always()
      # uses: actions/upload-artifact@v4
      # with:
      #  name: playwright-report
      # path: playwright-report/

      # Upload raw test results (screenshots/videos)
      #- name: Upload Test Results
      #  if: always()
      #  uses: actions/upload-artifact@v4
      #  with:
      #    name: test-results
      #    path: test-results/

      # Upload ENTIRE output folder (Excel, logs, subfolders)
      - name: Upload Output Folder
        #  if: failure()
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: output-data
          path: output/** # Upload everything inside, recursively
          if-no-files-found: warn
